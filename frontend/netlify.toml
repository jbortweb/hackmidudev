[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api"
  to = "https://jbortweb.com/api"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://jbortweb.com/api/:splat"
  status = 200
  force = true

[context.production.environment]
  NODE_VERSION = "18"
